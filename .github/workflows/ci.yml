---
# .github/workflows/ci.yml
# Lint, syntax check, and dry-run validation for RHEL patching repo

name: CI – Ansible Lint & Syntax Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  ANSIBLE_FORCE_COLOR: "1"
  ANSIBLE_HOST_KEY_CHECKING: "False"

jobs:

  # ─────────────────────────────────────────────────────────────────
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install ansible-lint ansible-core

      - name: Install collections
        run: |
          ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint
        run: |
          ansible-lint --profile=production playbooks/ roles/

  # ─────────────────────────────────────────────────────────────────
  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install ansible-core
          ansible-galaxy collection install -r requirements.yml

      - name: Create dummy inventory for syntax check
        run: |
          mkdir -p /tmp/test-inventory
          cat > /tmp/test-inventory/hosts <<EOF
          [rhel9]
          test-host.example.com ansible_connection=local
          EOF

      - name: Syntax check – patch.yml
        run: |
          ansible-playbook playbooks/patch.yml \
            -i /tmp/test-inventory/hosts \
            --syntax-check

      - name: Syntax check – rollback.yml
        run: |
          ansible-playbook playbooks/rollback.yml \
            -i /tmp/test-inventory/hosts \
            --syntax-check

      - name: Syntax check – report.yml
        run: |
          ansible-playbook playbooks/report.yml \
            -i /tmp/test-inventory/hosts \
            --syntax-check

  # ─────────────────────────────────────────────────────────────────
  molecule:
    name: Molecule Tests (per role)
    runs-on: ubuntu-latest
    needs: syntax-check
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        role: [patch_validation, rhel_patch, patch_report, rollback]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Molecule + Docker driver
        run: |
          pip install molecule molecule-plugins[docker] ansible-core docker

      - name: Run Molecule – ${{ matrix.role }}
        working-directory: roles/${{ matrix.role }}
        run: molecule test
        env:
          MOLECULE_DISTRO: "ubi9"
        continue-on-error: true  # molecule tests optional until molecule/ dirs are populated
