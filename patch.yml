---
# =============================================================================
# OS patching - RHEL & Ubuntu/Debian (single-file playbook, AAP 2.6)
#
# Updates every targeted host's packages, optionally skipping named
# packages/applications, and optionally rebooting afterwards if (and only if)
# the OS reports a reboot is required.
#
# ---------------------------------------------------------------------------
# AAP SURVEY QUESTIONS (add these to the job template survey)
#
#   1. patch_environment   Multiple Choice (single)
#      Prompt:  "Which environment is this run for?"
#      Choices: all / prod / nonprod          Default: all
#      NOTE: prod / nonprod are matched against the host's INVENTORY GROUP
#            names. Your inventory groups must be named to match the choices
#            (e.g. a group called "prod" and a group called "nonprod").
#            "all" patches every host in the job's inventory/limit.
#
#   2. dry_run             Multiple Choice (single)
#      Prompt:  "Dry run? (report changes without applying them)"
#      Choices: true / false                  Default: true
#
#   3. skip_packages       Text
#      Prompt:  "Packages/applications to skip (space or comma separated, blank for none)"
#      Default: (empty)
#
#   4. reboot_if_required  Multiple Choice (single)
#      Prompt:  "Reboot after upgrade if the OS requires it?"
#      Choices: true / false                  Default: false
# ---------------------------------------------------------------------------
#
# Behaviour notes:
#   * dry_run uses Ansible check_mode: package tasks report what WOULD change
#     and no holds, upgrades, or reboots are applied.
#   * skip_packages on RHEL uses dnf/yum `exclude`. On Ubuntu/Debian the named
#     packages are held (dpkg) for the upgrade, then released afterwards.
#     CAVEAT: if a skipped package was already permanently held, this run will
#     release that hold. Remove it from skip_packages to preserve such holds.
#   * "reboot if required" is detected with `dnf needs-restarting -r` on RHEL
#     (needs dnf-utils/yum-utils) and the /var/run/reboot-required marker on
#     Ubuntu/Debian.
# =============================================================================

- name: Patch RHEL & Ubuntu servers
  hosts: all
  gather_facts: true
  become: true

  vars:
    # ---- Overridable from AAP survey / extra-vars -------------------------
    patch_environment: "all"
    dry_run: true
    skip_packages: ""
    reboot_if_required: false
    # ----------------------------------------------------------------------

  tasks:
    # ---- Filter by environment -------------------------------------------
    - name: Skip hosts not in the selected environment
      ansible.builtin.meta: end_host
      when:
        - patch_environment != "all"
        - patch_environment not in group_names

    # ---- Normalise survey input ------------------------------------------
    - name: Build skip list from survey input
      ansible.builtin.set_fact:
        skip_list: "{{ (skip_packages | regex_replace(',', ' ')).split() }}"

    - name: Show planned patching run
      ansible.builtin.debug:
        msg: |
          =====================================
          OS PATCHING PLAN
          =====================================
          Host: {{ inventory_hostname }}
          OS family: {{ ansible_os_family }}
          Environment: {{ patch_environment }}
          Dry run: {{ dry_run }}
          Skipping: {{ skip_list | default([]) | join(', ') if skip_list else 'nothing' }}
          Reboot if required: {{ reboot_if_required }}
          =====================================

    # ---- RHEL / RedHat-family upgrade ------------------------------------
    - name: Upgrade all packages (dnf - RHEL/RedHat)
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_cache: true
        exclude: "{{ skip_list }}"
      check_mode: "{{ dry_run | bool }}"
      when:
        - ansible_os_family == "RedHat"
        - ansible_pkg_mgr in ["dnf", "dnf5"]
      register: rhel_dnf_upgrade

    - name: Upgrade all packages (yum - older RHEL/RedHat)
      ansible.builtin.yum:
        name: "*"
        state: latest
        update_cache: true
        exclude: "{{ skip_list }}"
      check_mode: "{{ dry_run | bool }}"
      when:
        - ansible_os_family == "RedHat"
        - ansible_pkg_mgr == "yum"
      register: rhel_yum_upgrade

    # ---- Ubuntu / Debian-family upgrade ----------------------------------
    - name: Hold skipped packages (Debian/Ubuntu)
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop: "{{ skip_list }}"
      when:
        - ansible_os_family == "Debian"
        - not dry_run | bool

    - name: Upgrade all packages (apt - Ubuntu/Debian)
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
      check_mode: "{{ dry_run | bool }}"
      when: ansible_os_family == "Debian"
      register: deb_apt_upgrade

    - name: Release holds on skipped packages (Debian/Ubuntu)
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: install
      loop: "{{ skip_list }}"
      when:
        - ansible_os_family == "Debian"
        - not dry_run | bool

    # ---- Reboot-if-required detection ------------------------------------
    - name: Check whether a reboot is required (RHEL/RedHat)
      ansible.builtin.command: dnf needs-restarting -r
      register: rhel_reboot_check
      changed_when: false
      failed_when: false
      when: ansible_os_family == "RedHat"

    - name: Check whether a reboot is required (Debian/Ubuntu)
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: deb_reboot_check
      when: ansible_os_family == "Debian"

    - name: Set reboot_needed fact
      ansible.builtin.set_fact:
        reboot_needed: >-
          {{ (ansible_os_family == 'RedHat' and rhel_reboot_check.rc | default(0) == 1)
             or (ansible_os_family == 'Debian' and deb_reboot_check.stat.exists | default(false)) }}

    # ---- Reboot (only if needed, approved, and not a dry run) -------------
    - name: Reboot if required and approved
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible OS patching playbook"
        reboot_timeout: 600
      when:
        - reboot_if_required | bool
        - reboot_needed | bool
        - not dry_run | bool

    - name: Patching summary
      ansible.builtin.debug:
        msg: >-
          {{ inventory_hostname }} patched
          ({{ 'DRY RUN - no changes applied' if dry_run | bool else 'changes applied' }}).
          Reboot required: {{ reboot_needed }}.
          Reboot performed: {{ (reboot_if_required | bool) and (reboot_needed | bool) and (not dry_run | bool) }}.
