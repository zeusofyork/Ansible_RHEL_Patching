---
# roles/rhel_patch/tasks/reboot.yml

- name: Check if reboot is needed (needs-restarting)
  ansible.builtin.command: needs-restarting -r
  register: needs_restarting_check
  changed_when: false
  failed_when: false

- name: Set reboot required fact
  ansible.builtin.set_fact:
    patch_reboot_required: "{{ needs_restarting_check.rc == 1 }}"

- name: Log reboot status
  ansible.builtin.debug:
    msg: >
      Reboot required: {{ patch_reboot_required }},
      Policy: {{ patch_reboot_policy }}

# ── Reboot: always ────────────────────────────────────────────────────────────
- name: Reboot (policy=always)
  ansible.builtin.reboot:
    reboot_timeout: "{{ patch_reboot_timeout }}"
    test_command: "{{ patch_reboot_test_command }}"
    msg: "Rebooting as part of scheduled patching (policy=always)"
  when:
    - patch_reboot_policy == "always"
    - patch_dnf_result.changed | default(false) | bool

# ── Reboot: if_needed ─────────────────────────────────────────────────────────
- name: Reboot if needed (policy=if_needed)
  ansible.builtin.reboot:
    reboot_timeout: "{{ patch_reboot_timeout }}"
    test_command: "{{ patch_reboot_test_command }}"
    msg: "Rebooting — kernel or core libraries updated"
  when:
    - patch_reboot_policy == "if_needed"
    - patch_reboot_required | bool

# ── No reboot ─────────────────────────────────────────────────────────────────
- name: Log reboot skipped
  ansible.builtin.debug:
    msg: >
      Reboot skipped.
      {% if patch_reboot_policy == 'never' %}
      Policy is set to 'never'.
      {% elif not patch_reboot_required %}
      No reboot needed.
      {% endif %}
  when: >
    patch_reboot_policy == "never" or
    (patch_reboot_policy == "if_needed" and not patch_reboot_required | bool)

- name: Wait for connection to be restored (sanity check)
  ansible.builtin.wait_for_connection:
    delay: 5
    timeout: "{{ patch_reboot_timeout }}"
  when: patch_reboot_policy != "never"
