---
# roles/patch_report/tasks/main.yml

- name: Set report timestamp and filename base
  ansible.builtin.set_fact:
    report_timestamp: "{{ ansible_date_time.iso8601_basic_short }}"
    report_basename: "{{ inventory_hostname }}_{{ ansible_date_time.iso8601_basic_short }}"

- name: Ensure report directory exists on target
  ansible.builtin.file:
    path: "{{ patch_report_dest }}"
    state: directory
    mode: "0750"
    owner: root
    group: root

- name: Generate JSON report
  ansible.builtin.template:
    src: patch_report.json.j2
    dest: "{{ patch_report_dest }}/{{ report_basename }}.json"
    mode: "0640"
  when: "'json' in patch_report_formats"

- name: Generate HTML report
  ansible.builtin.template:
    src: patch_report.html.j2
    dest: "{{ patch_report_dest }}/{{ report_basename }}.html"
    mode: "0640"
  when: "'html' in patch_report_formats"

- name: Fetch JSON report to controller
  ansible.builtin.fetch:
    src: "{{ patch_report_dest }}/{{ report_basename }}.json"
    dest: "{{ patch_report_local_dest }}/{{ report_basename }}.json"
    flat: true
  when:
    - patch_report_fetch | bool
    - "'json' in patch_report_formats"

- name: Fetch HTML report to controller
  ansible.builtin.fetch:
    src: "{{ patch_report_dest }}/{{ report_basename }}.html"
    dest: "{{ patch_report_local_dest }}/{{ report_basename }}.html"
    flat: true
  when:
    - patch_report_fetch | bool
    - "'html' in patch_report_formats"

- name: Log report location
  ansible.builtin.debug:
    msg:
      - "Reports written to: {{ patch_report_dest }}/{{ report_basename }}.[json|html]"
      - "Fetched locally to: {{ patch_report_local_dest }}/"
  when: patch_report_fetch | bool
