---
# roles/rollback/tasks/main.yml

- name: Verify rollback is enabled
  ansible.builtin.assert:
    that:
      - patch_rollback_enabled | bool
    fail_msg: "Rollback is disabled (patch_rollback_enabled=false). Set to true to proceed."

- name: Get current DNF history
  ansible.builtin.command: dnf history list
  register: dnf_history
  changed_when: false

- name: Display recent DNF history
  ansible.builtin.debug:
    msg: "{{ dnf_history.stdout_lines[:15] }}"

- name: Get last transaction ID
  ansible.builtin.shell: dnf history list | grep -v '^$' | awk 'NR==2 {print $1}'
  register: last_txid
  changed_when: false

- name: Show transaction to be rolled back
  ansible.builtin.command: "dnf history info {{ last_txid.stdout | trim }}"
  register: txid_info
  changed_when: false

- name: Display transaction info
  ansible.builtin.debug:
    msg: "{{ txid_info.stdout_lines }}"

- name: Execute DNF history rollback
  ansible.builtin.command: >
    dnf history undo {{ last_txid.stdout | trim }} -y
  register: rollback_result
  changed_when: rollback_result.rc == 0

- name: Display rollback result
  ansible.builtin.debug:
    msg: "{{ rollback_result.stdout_lines }}"

- name: Store rollback facts for report
  ansible.builtin.set_fact:
    patch_rollback_facts:
      transaction_id: "{{ last_txid.stdout | trim }}"
      result: "{{ 'success' if rollback_result.rc == 0 else 'failed' }}"
      timestamp: "{{ ansible_date_time.iso8601 }}"
      output: "{{ rollback_result.stdout }}"
