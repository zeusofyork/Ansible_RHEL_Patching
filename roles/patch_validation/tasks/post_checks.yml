---
# roles/patch_validation/tasks/post_checks.yml

- name: "[POST] Capture list of packages after patching"
  ansible.builtin.shell: rpm -qa --queryformat '%{NAME}-%{VERSION}-%{RELEASE}.%{ARCH}\n' | sort
  register: post_patch_packages
  changed_when: false

- name: "[POST] Capture running kernel"
  ansible.builtin.command: uname -r
  register: post_patch_kernel
  changed_when: false

- name: "[POST] Capture installed kernel list"
  ansible.builtin.shell: rpm -q kernel --queryformat '%{VERSION}-%{RELEASE}.%{ARCH}\n' | sort
  register: post_patch_kernels
  changed_when: false

- name: "[POST] Capture last DNF transaction ID"
  ansible.builtin.shell: dnf history list --reverse | tail -1 | awk '{print $1}'
  register: post_patch_dnf_txid
  changed_when: false

- name: "[POST] Check that required services are running"
  ansible.builtin.service_facts:

- name: "[POST] Assert required services are active"
  ansible.builtin.assert:
    that:
      - "ansible_facts.services[item + '.service'] is defined"
      - "ansible_facts.services[item + '.service'].state == 'running'"
    fail_msg: "Service {{ item }} is not running post-patch"
    success_msg: "Service check passed: {{ item }}"
  loop: "{{ patch_check_services }}"
  register: service_check_results
  ignore_errors: "{{ not patch_post_checks_fail_fast | bool }}"

- name: "[POST] Check for needs-restarting output"
  ansible.builtin.command: needs-restarting -r
  register: needs_restarting
  changed_when: false
  failed_when: false

- name: "[POST] Compute package diff"
  ansible.builtin.set_fact:
    packages_added: >-
      {{ post_patch_packages.stdout_lines | difference(patch_pre_facts.packages) }}
    packages_removed: >-
      {{ patch_pre_facts.packages | difference(post_patch_packages.stdout_lines) }}

- name: "[POST] Set post-check failure flag"
  ansible.builtin.set_fact:
    patch_post_check_failed: >-
      {{ service_check_results is defined and service_check_results.failed | default(false) }}

- name: "[POST] Store post-patch facts for report"
  ansible.builtin.set_fact:
    patch_post_facts:
      packages: "{{ post_patch_packages.stdout_lines }}"
      packages_added: "{{ packages_added }}"
      packages_removed: "{{ packages_removed }}"
      kernel: "{{ post_patch_kernel.stdout }}"
      kernels: "{{ post_patch_kernels.stdout_lines }}"
      kernel_changed: "{{ pre_patch_kernel.stdout != post_patch_kernel.stdout }}"
      dnf_txid: "{{ post_patch_dnf_txid.stdout | trim }}"
      reboot_required: "{{ needs_restarting.rc == 1 }}"
      services_ok: "{{ not patch_post_check_failed }}"
      timestamp: "{{ ansible_date_time.iso8601 }}"

- name: "[POST] Display patch summary"
  ansible.builtin.debug:
    msg:
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - "  POST-PATCH SUMMARY: {{ inventory_hostname }}"
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - "  Packages updated : {{ packages_added | length }}"
      - "  Packages removed : {{ packages_removed | length }}"
      - "  Kernel changed   : {{ patch_post_facts.kernel_changed }}"
      - "  Running kernel   : {{ post_patch_kernel.stdout }}"
      - "  Reboot required  : {{ patch_post_facts.reboot_required }}"
      - "  Services OK      : {{ patch_post_facts.services_ok }}"
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
