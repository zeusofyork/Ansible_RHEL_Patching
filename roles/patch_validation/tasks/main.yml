---
# roles/patch_validation/tasks/main.yml

- name: Run pre-patch checks
  ansible.builtin.include_tasks: pre_checks.yml
  when: patch_validation_phase == "pre"
  tags: [pre_patch]

- name: Run post-patch checks
  ansible.builtin.include_tasks: post_checks.yml
  when: patch_validation_phase == "post"
  tags: [post_patch]
