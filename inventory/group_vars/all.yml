---
# inventory/group_vars/all.yml
# Global patching defaults — override at group or host level as needed

# ──────────────────────────────────────────────
# Reboot policy
# ──────────────────────────────────────────────
patch_reboot_policy: "if_needed"       # always | never | if_needed
patch_reboot_timeout: 600              # seconds to wait for host to return
patch_reboot_test_command: "uptime"    # command to confirm host is responsive post-reboot

# ──────────────────────────────────────────────
# Package update scope
# ──────────────────────────────────────────────
patch_update_all: true                 # update all packages; set false to use patch_packages list
patch_packages: []                     # specific packages to update when patch_update_all: false
patch_exclude_packages:                # packages always excluded from updates
  - kernel*                            # remove if you want kernel updates
  - redhat-release*
patch_security_only: false             # limit to security errata only

# ──────────────────────────────────────────────
# Subscription Manager
# ──────────────────────────────────────────────
patch_subscription_manager: true
patch_subman_auto_attach: false
patch_subman_release_lock: ""          # e.g. "9.4" to lock to a minor release; "" = unlocked
patch_subman_verify_repos: true        # verify required repos are enabled before patching

patch_required_repos:
  - rhel-9-for-x86_64-baseos-rpms
  - rhel-9-for-x86_64-appstream-rpms

# ──────────────────────────────────────────────
# Pre/post validation
# ──────────────────────────────────────────────
patch_pre_checks_fail_fast: true       # abort play if pre-checks fail
patch_post_checks_fail_fast: false     # warn but continue if post-checks fail (report will flag)

patch_check_disk_min_free_mb: 1024     # minimum free MB on / before patching
patch_check_load_max: 4.0              # abort if 1-min load avg exceeds this
patch_check_services: []              # services that must be running post-patch
                                       # e.g. [sshd, firewalld, auditd]

# ──────────────────────────────────────────────
# Rollback
# ──────────────────────────────────────────────
patch_rollback_enabled: true
patch_rollback_on_failure: false       # auto-rollback if post-checks fail (use with caution)
patch_rollback_transaction_count: 1    # number of DNF transactions to roll back

# ──────────────────────────────────────────────
# Reporting
# ──────────────────────────────────────────────
patch_report_dest: "/var/log/patching"
patch_report_fetch: true
patch_report_local_dest: "./reports"
patch_report_formats:
  - json
  - html

# ──────────────────────────────────────────────
# Maintenance window tag (informational only)
# ──────────────────────────────────────────────
patch_window: "unscheduled"
