---
# inventory/host_vars/db01.example.com.yml
# Example host-level overrides for a critical DB server

# Never auto-reboot — handle manually after DB maintenance
patch_reboot_policy: "never"

# Exclude DB packages from automated patching
patch_exclude_packages:
  - kernel*
  - redhat-release*
  - mysql*
  - postgresql*

# Extra services to validate post-patch
patch_check_services:
  - sshd
  - firewalld
  - auditd
  - chronyd
  - mysqld

# Require more free disk before patching (DB servers hold more data)
patch_check_disk_min_free_mb: 4096

# Do not auto-rollback — alert only
patch_rollback_on_failure: false
