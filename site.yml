---
# =============================================================================
# Wiz -> RHEL remediation (single-file playbook, AAP 2.6)
#
# Three plays:
#   1. Pre-update (all)        - optional OS package update+upgrade (survey-gated)
#   2. Collect  (localhost)    - pull Wiz findings, build dynamic inventory
#   3. Remediate (wiz_targets) - filter, report, ServiceNow approval, remediate
#
# Expected credentials (environment variables on the execution environment):
#   WIZ_CLIENT_ID, WIZ_CLIENT_SECRET
#
# Expected variables (AAP survey / extra-vars). Defaults below keep the
# playbook runnable; override them from the controller as needed:
#   run_system_update  - true | false  run OS update+upgrade first (default: false)
#   dry_run            - true | false   when true the pre-update only reports what
#                                       would change (check_mode); also gates the
#                                       Wiz remediation play (default: true)
#   skip_packages      - free text      space/comma separated packages to exclude
#                                       from the OS upgrade (default: "" = none)
#   reboot_if_required - yes | no       reboot after upgrade only when the OS
#                                       reports one is needed and not dry_run
#                                       (default: no)
#   target_env     - "all" | "prod" | "test" ...   (default: all)
#   snow_instance  - ServiceNow instance host      (prod approvals only)
#   snow_user      - ServiceNow user               (prod approvals only)
#   snow_pass      - ServiceNow password           (prod approvals only)
#   remediation_map- map of vuln title -> { command }
#
# An importable survey covering the pre-update inputs lives in
# aap/patch_survey_spec.json (see aap/README.md for wiring it up).
# The pre-update targets every host in the inventory; use the job template's
# Limit field to narrow it to specific hosts.
#
# Environment (prod/test) is derived from the Wiz instance name: if the
# name contains "prod" -> prod, "test" -> test, otherwise "unknown".
# =============================================================================

- name: Pre-Wiz OS package update
  hosts: all
  gather_facts: true
  become: true

  vars:
    # Overridable from AAP survey / extra-vars. When run_system_update is false,
    # every task below is skipped and this play is a no-op.
    run_system_update: false
    dry_run: true
    skip_packages: ""
    reboot_if_required: "no"

  tasks:
    - name: Normalise pre-update inputs
      set_fact:
        update_dry_run: "{{ dry_run | bool }}"
        do_reboot: "{{ reboot_if_required | lower in ['yes', 'true', 'y'] }}"
        skip_list: "{{ (skip_packages | default('') | replace(',', ' ')).split() }}"
      when: run_system_update | bool

    - name: Show OS update plan
      debug:
        msg:
          - "Host: {{ inventory_hostname }} ({{ ansible_distribution }} {{ ansible_distribution_version }})"
          - "Package manager: {{ ansible_pkg_mgr }}"
          - "Mode: {{ 'DRY RUN (no changes)' if update_dry_run else 'LIVE (changes applied)' }}"
          - "Excluded packages: {{ skip_list | join(', ') if skip_list | length > 0 else 'none' }}"
          - "Reboot if required: {{ do_reboot }}"
      when: run_system_update | bool

    # ---- apt (Debian/Ubuntu): hold excluded pkgs, upgrade, release ---------
    - name: Hold skipped packages (apt)
      dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop: "{{ skip_list }}"
      check_mode: "{{ update_dry_run }}"
      when:
        - run_system_update | bool
        - ansible_pkg_mgr == "apt"

    - name: Update + upgrade all packages (apt)
      apt:
        update_cache: true
        upgrade: dist
      check_mode: "{{ update_dry_run }}"
      when:
        - run_system_update | bool
        - ansible_pkg_mgr == "apt"

    - name: Release holds on skipped packages (apt)
      dpkg_selections:
        name: "{{ item }}"
        selection: install
      loop: "{{ skip_list }}"
      check_mode: "{{ update_dry_run }}"
      when:
        - run_system_update | bool
        - ansible_pkg_mgr == "apt"

    # ---- dnf (RHEL 8+/Fedora): exclude excluded pkgs -----------------------
    - name: Update + upgrade all packages (dnf)
      dnf:
        name: "*"
        state: latest
        update_cache: true
        exclude: "{{ skip_list }}"
      check_mode: "{{ update_dry_run }}"
      when:
        - run_system_update | bool
        - ansible_pkg_mgr in ["dnf", "dnf5"]

    # ---- yum (RHEL 7): exclude excluded pkgs -------------------------------
    - name: Update + upgrade all packages (yum)
      yum:
        name: "*"
        state: latest
        update_cache: true
        exclude: "{{ skip_list | join(',') }}"
      check_mode: "{{ update_dry_run }}"
      when:
        - run_system_update | bool
        - ansible_pkg_mgr == "yum"

    # ---- Reboot (only when requested, live, and actually required) ---------
    - name: Check whether a reboot is required (RedHat)
      command: needs-restarting -r
      register: rh_reboot_check
      changed_when: false
      failed_when: false
      when:
        - run_system_update | bool
        - ansible_os_family == "RedHat"

    - name: Check whether a reboot is required (Debian)
      stat:
        path: /var/run/reboot-required
      register: deb_reboot_check
      when:
        - run_system_update | bool
        - ansible_os_family == "Debian"

    - name: Reboot if required and requested
      reboot:
        msg: "Rebooting after OS package update (AAP pre-update play)"
        reboot_timeout: 600
      when:
        - run_system_update | bool
        - do_reboot | default(false) | bool
        - not update_dry_run | default(true) | bool
        - (rh_reboot_check.rc | default(0)) == 1 or (deb_reboot_check.stat.exists | default(false))


- name: Collect Wiz findings
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Get Wiz token
      uri:
        url: "https://auth.wiz.io/oauth/token"
        method: POST
        body_format: json
        body:
          client_id: "{{ lookup('env', 'WIZ_CLIENT_ID') }}"
          client_secret: "{{ lookup('env', 'WIZ_CLIENT_SECRET') }}"
          audience: "wiz-api"
          grant_type: "client_credentials"
      register: wiz_auth

    - name: Query Wiz issues
      uri:
        url: "https://api.wiz.io/graphql"
        method: POST
        headers:
          Authorization: "Bearer {{ wiz_auth.json.access_token }}"
          Content-Type: "application/json"
        body_format: json
        body:
          query: >-
            query { issues(first: 50) { nodes { id title severity
            remediation { description }
            entity { ... on CloudInstance { name publicIp privateIp } } } } }
      register: wiz_data

    - name: Set findings
      set_fact:
        findings: "{{ wiz_data.json.data.issues.nodes }}"

    - name: Add hosts dynamically
      add_host:
        name: "{{ ip }}"
        groups: wiz_targets
        host_name: "{{ host_name }}"
        env_type: >-
          {{ 'prod' if 'prod' in host_name | lower
             else 'test' if 'test' in host_name | lower
             else 'unknown' }}
        severity: "{{ item.severity }}"
        vuln_title: "{{ item.title }}"
        remediation_text: "{{ item.remediation.description | default('') }}"
      vars:
        ip: "{{ item.entity.publicIp | default(item.entity.privateIp) }}"
        host_name: "{{ item.entity.name | default('') }}"
      loop: "{{ findings }}"
      when: item.entity is defined


- name: Filter + approval + remediate
  hosts: wiz_targets
  gather_facts: false

  vars:
    # ---- Overridable from AAP survey / extra-vars -------------------------
    target_env: "all"
    dry_run: true

    remediation_map:
      "OpenSSH Vulnerability":
        command: "yum update openssh -y"
    # ----------------------------------------------------------------------

  tasks:
    # ---- Filter ----------------------------------------------------------
    - name: Skip hosts not matching environment
      meta: end_host
      when:
        - target_env != "all"
        - env_type != target_env

    - name: Block non-critical changes in prod
      meta: end_host
      when:
        - env_type == "prod"
        - severity != "CRITICAL"

    # ---- Report ----------------------------------------------------------
    - name: Show planned remediation
      debug:
        msg: |
          =====================================
          WIZ REMEDIATION REPORT
          =====================================
          Host: {{ inventory_hostname }}
          Name: {{ host_name }}
          Env: {{ env_type }}
          Severity: {{ severity }}
          Vulnerability: {{ vuln_title }}
          Remediation: {{ remediation_text }}
          Dry Run: {{ dry_run }}
          =====================================

    # ---- ServiceNow approval (prod only) ---------------------------------
    - name: Skip ServiceNow approval if not prod
      meta: end_host
      when: env_type != "prod"

    - name: Create ServiceNow Change Request
      uri:
        url: "https://{{ snow_instance }}/api/now/table/change_request"
        method: POST
        user: "{{ snow_user }}"
        password: "{{ snow_pass }}"
        force_basic_auth: true
        headers:
          Content-Type: "application/json"
        body_format: json
        body:
          short_description: "Wiz Remediation - {{ vuln_title }}"
          description: "Host: {{ inventory_hostname }} | Vulnerability: {{ vuln_title }}"
          category: "Security"
          type: "standard"
      register: snow_change

    - name: Wait for approval
      uri:
        url: "https://{{ snow_instance }}/api/now/table/change_request/{{ snow_change.json.result.sys_id }}"
        method: GET
        user: "{{ snow_user }}"
        password: "{{ snow_pass }}"
        force_basic_auth: true
      register: change_status
      until: change_status.json.result.state == "3"
      retries: 20
      delay: 30

    # ---- Remediation -----------------------------------------------------
    - name: Determine command
      set_fact:
        remediation_cmd: >-
          {{ remediation_map[vuln_title].command
             if vuln_title in remediation_map
             else "echo 'No mapped remediation'" }}

    - name: Skip execution if dry run
      meta: end_host
      when: dry_run | bool

    - name: Execute remediation
      shell: "{{ remediation_cmd }}"
      become: true
      register: result
      ignore_errors: true

    - name: Show remediation output
      debug:
        var: result.stdout
