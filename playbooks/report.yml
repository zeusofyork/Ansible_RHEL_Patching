---
# playbooks/report.yml
# Generate a patch status report without running patches
# Useful for auditing what updates are available
#
# Usage:
#   ansible-playbook playbooks/report.yml -i inventory/hosts

- name: RHEL 9 Patch Availability Report
  hosts: "{{ patch_target | default('all') }}"
  gather_facts: true

  roles:
    - role: patch_report
      vars:
        patch_report_mode: availability
      tags: [report]
